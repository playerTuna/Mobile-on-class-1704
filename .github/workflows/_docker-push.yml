name: Docker Push

on:
  workflow_call:
    inputs:
      image-name:
        required: true
        type: string
      acr-login-server:
        required: true
        type: string
      acr-registry-name:
        required: true
        type: string
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  docker-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Debug inputs
        run: |
          echo "image-name:        ${{ inputs.image-name }}"
          echo "acr-login-server:  ${{ inputs.acr-login-server }}"
          echo "acr-registry-name: ${{ inputs.acr-registry-name }}"

      - name: Authenticate to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name "${{ inputs.acr-registry-name }}"

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: |
            ${{ inputs.acr-login-server }}/${{ inputs.image-name }}:sha-${{ github.sha }}
            ${{ inputs.acr-login-server }}/${{ inputs.image-name }}:latest

