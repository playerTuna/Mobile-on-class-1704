name: Docker Build

on:
  workflow_call:

jobs:
  docker-build:
    name: Docker Build (validate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: false
          tags: app:pr-${{ github.sha }}
