name: Deploy

on:
  workflow_call:
    inputs:
      image-name:
        required: true
        type: string
      acr-login-server:
        required: true
        type: string
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to Container Apps
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy image
        run: |
          az containerapp update \
            --resource-group rg-anmind-production \
            --name containerapp-anmind \
            --image ${{ inputs.acr-login-server }}/${{ inputs.image-name }}:sha-${{ github.sha }}

      - name: Get FQDN
        id: fqdn
        run: |
          FQDN=$(az containerapp show \
            --resource-group rg-anmind-production \
            --name containerapp-anmind \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          echo "fqdn=$FQDN" >> $GITHUB_OUTPUT

      - name: Smoke test — GET /health
        run: |
          curl --fail \
               --retry 10 \
               --retry-delay 10 \
               --retry-all-errors \
               https://${{ steps.fqdn.outputs.fqdn }}/health
